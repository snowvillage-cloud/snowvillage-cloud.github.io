<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>お知らせ - SnowVillage</title>
    
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/home.css" />
    <link rel="stylesheet" href="../style.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet" />
    
    <style>
      /* アーカイブページ専用の微調整 */
      .archive-container {
        padding-top: 150px;
        min-height: 80vh;
      }
      .news-wrapper {
        max-width: 1000px;
        margin: 0 auto 100px auto; /* 🌟 中央寄せを確実にする */
      }
      .news-item {
        padding: 20px 0;
        list-style: none; /* 🌟 箇条書きの黒ポッチを消す */
      }
    </style>
  </head>
  <body>
    <div id="header-container"></div>

    <main>
      <div class="container archive-container">
        <h2 class="reveal" style="text-align: center; margin-bottom: 40px; color: var(--secondary);">News Archive</h2>

        <div class="news-wrapper reveal">
          <ul id="news-full-list" style="padding: 0; margin: 0;"></ul>
        </div>
      </div>
    </main>

    <div id="footer-container"></div>

    <script src="../newsData.js"></script>
    <script src="../script.js"></script>
    <script>
      // 🌟 第一引数 ".." は「一つ上の階層」を意味します
      if (typeof renderHeader === "function") {
        renderHeader("..", "news");
        renderFooter("..");
      }

      // 🌟 アーカイブページ専用の読み込み処理
      window.addEventListener("DOMContentLoaded", () => {
        const fullList = document.getElementById("news-full-list");
        if (fullList && typeof newsData !== "undefined") {
          fullList.innerHTML = newsData
            .map(
              (item, index) => `
            <li class="news-item">
                <a href="${item.link.startsWith("http") ? item.link : "../" + item.link}"
                   class="news-link"
                   ${item.isExternal ? 'target="_blank"' : ""}>
                    <span class="news-date">${item.date}</span>
                    <span class="news-badge-slot">${index === 0 ? '<span class="news-badge-new">NEW</span>' : ""}</span>
                    <span class="news-text">${item.text}</span>
                    <span class="news-arrow">→</span>
                </a>
            </li>
        `,
            )
            .join("");
        }
      });
    </script>
  </body>
</html>
