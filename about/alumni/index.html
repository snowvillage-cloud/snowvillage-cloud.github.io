<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="SnowVillage は Snowflake 日本ユーザーコミュニティ。人のつながりから世界のデータを Mobilize するエンジニアコミュニティです。" />

    <meta property="og:url" content="https://snowvillage.cloud/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SnowVillage | Snowflake 日本ユーザーコミュニティ" />
    <meta property="og:description" content="SnowVillage は Snowflake 日本ユーザーコミュニティ。人のつながりから世界のデータを Mobilize するエンジニアコミュニティです。" />
    <meta property="og:site_name" content="SnowVillage" />
    <meta property="og:image" content="https://snowvillage.cloud/images/brand/logo-white.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://snowvillage.cloud/images/brand/logo-white.png" />

    <title>歴代の貢献者 - SnowVillage</title>
    <link rel="stylesheet" href="../../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>

    <main class="container" style="padding-top: 150px;">
        <section>
            <div style="text-align: center; margin-bottom: 60px;">
                <p class="reveal" style="color: var(--primary); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px;">Thanks to</p>
                <h1 class="reveal" style="color: var(--secondary); font-size: 2.6rem; margin-bottom: 18px;">歴代の貢献者へ感謝を込めて</h1>
                <p class="reveal" style="color: var(--text-light); font-size: 1.1rem; max-width: 640px; margin: 0 auto;">
                    SnowVillage の土台を築き、コミュニティの発展に多大なる貢献をしてくださった卒業メンバーを紹介します。
                </p>
            </div>

            <div class="grid">
                <div class="card reveal member-card" style="transition-delay: 0s; background-color: #f8fafc; border: none;">
                    <img src="../../images/alumni/photo_saburo.jpg" alt="Data Saburo" class="member-photo">
                    <h3>Data Saburo</h3>
                    <p style="color: var(--text-light); font-weight: 500; font-size: 0.9rem; margin-bottom: 10px;">
                        📅 在籍期間: 2022 - 2024
                    </p>
                    <p style="color: var(--primary); font-weight: 600; font-size: 0.9rem;">Former Co-Organizer</p>
                    <p class="desc" style="font-size: 0.9rem; color: var(--text-light); margin-top: 10px;">
                        コミュニティの立ち上げ期を支え、第1回から第10回までのミートアップを牽引しました。
                    </p>
                </div>
                
                <div class="card reveal member-card" style="transition-delay: 0.1s; background-color: #f8fafc; border: none;">
                    <img src="../../images/alumni/photo_shiro.jpg" alt="Cloud Shiro" class="member-photo">
                    <h3>Cloud Shiro</h3>
                    <p style="color: var(--text-light); font-weight: 500; font-size: 0.9rem; margin-bottom: 10px;">
                        📅 在籍期間: 2023 - 2025
                    </p>
                    <p style="color: var(--primary); font-weight: 600; font-size: 0.9rem;">Former Tech Lead</p>
                    <p class="desc" style="font-size: 0.9rem; color: var(--text-light); margin-top: 10px;">
                        数々のハンズオン資料を作成し、多くの初心者をSnowflakeの世界へ導きました。
                    </p>
                </div>
            </div>
            
            <div class="reveal" style="text-align: center; margin-top: 60px;">
                <a href="../" class="btn-text" style="color: var(--secondary); text-decoration: none; font-weight: 600;">← 運営トップへ戻る</a>
            </div>
        </section>
    </main>
    <div id="footer-container"></div>
    
    <script src="../../script.js"></script>
    <script>
        // 🌟 階層を '../..' にする
        renderHeader('../..', 'alumni');
        renderFooter();
    </script>
</body>
</html>
