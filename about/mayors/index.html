<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SnowVillage は Snowflake 日本ユーザーコミュニティ。人のつながりから世界のデータを Mobilize するエンジニアコミュニティです。" />

    <meta property="og:url" content="https://snowvillage.cloud/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SnowVillage | Snowflake 日本ユーザーコミュニティ" />
    <meta property="og:description" content="SnowVillage は Snowflake 日本ユーザーコミュニティ。人のつながりから世界のデータを Mobilize するエンジニアコミュニティです。" />
    <meta property="og:site_name" content="SnowVillage" />
    <meta property="og:image" content="https://snowvillage.cloud/images/brand/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="SnowVillage" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://snowvillage.cloud/images/brand/og-image.png" />
    <title>Mayors - SnowVillage</title>
    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="../../css/about.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="header-container"></div>

    <main class="container" style="padding-top: 150px; padding-bottom: 100px">
      <div style="text-align: center; margin-bottom: 60px">
        <h1 class="reveal" style="color: var(--secondary); font-size: 2.8rem; margin-bottom: 15px">Mayors</h1>
        <p class="reveal" style="color: var(--text-light); font-size: 1.1rem; max-width: 700px; margin: 0 auto">
          みんながもっとつながり、活発なコミュニティ運営ができるようサポートします。<br />
          Event、Brand、Growth、Operationの4部門でコミュニティの成長をリードします！<br />
        </p>
      </div>

      <div id="mayors-grid" class="grid"></div>

      <div class="reveal" style="text-align: center; margin-top: 60px">
        <a href="../" class="btn-text" style="color: var(--secondary); text-decoration: none; font-weight: 600">← 運営トップへ戻る</a>
      </div>
    </main>

    <div id="footer-container"></div>

    <script src="../../script.js"></script>
    <script src="../aboutData.js"></script>
    <script>
      renderHeader("../..", "mayors");
      renderFooter();

      const grid = document.getElementById("mayors-grid");
      if (grid && typeof mayorsData !== "undefined") {
        // about/ 配下からのパスを mayors/ 配下から見たパスに変換
        const fixPath = (p) => (p && p.startsWith("../") ? "../" + p : p);

        const deptAnchors = {
          Event: "event",
          Brand: "brand",
          Growth: "growth",
          Operation: "operation",
        };

        grid.innerHTML = mayorsData
          .map((member, index) => {
            const tagsHtml =
              member.departments && member.departments.length > 0
                ? `
                <div style="margin-top: 18px;">
                  <p style="font-size: 0.7rem; color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">FOCUS / 注力領域</p>
                  <div class="dept-tags">
                    ${member.departments
                      .map((dept) => {
                        const anchorId = deptAnchors[dept] || "";
                        return `<a href="../departments/#${anchorId}" class="dept-tag">${dept}</a>`;
                      })
                      .join("")}
                  </div>
                </div>`
                : "";

            return `
              <div class="card reveal member-card" style="transition-delay: ${index * 0.1}s">
                <img src="${fixPath(member.photo)}" alt="${member.name}" class="member-photo" />
                <h3>${member.name}</h3>
                <p style="color: var(--secondary); font-weight: 600; font-size: 0.9rem;">${member.role}</p>
                ${tagsHtml}
                <p class="desc" style="font-size: 0.9rem; color: var(--text-light); margin-top: 15px; border-top: 1px dashed #e2e8f0; padding-top: 15px;">${member.desc}</p>
                <div class="member-sns">
                  ${
                    member.xUrl
                      ? `<a href="${member.xUrl}" target="_blank" rel="noopener noreferrer" class="sns-link" aria-label="X">
                          <svg viewBox="0 0 24 24" class="sns-icon"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                        </a>`
                      : ""
                  }
                  ${
                    member.linkedInUrl
                      ? `<a href="${member.linkedInUrl}" target="_blank" rel="noopener noreferrer" class="sns-link" aria-label="LinkedIn">
                          <svg viewBox="0 0 24 24" class="sns-icon"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"></path></svg>
                        </a>`
                      : ""
                  }
                  ${
                    member.githubUrl
                      ? `<a href="${member.githubUrl}" target="_blank" rel="noopener noreferrer" class="sns-link" aria-label="GitHub">
                          <svg viewBox="0 0 24 24" class="sns-icon"><path d="M12 .5C5.649.5.5 5.649.5 12A11.5 11.5 0 0 0 8.36 22.07c.575.106.785-.25.785-.556 0-.274-.01-1-.016-1.962-3.182.692-3.853-1.533-3.853-1.533-.52-1.321-1.27-1.673-1.27-1.673-1.038-.71.079-.695.079-.695 1.148.08 1.752 1.178 1.752 1.178 1.02 1.746 2.676 1.241 3.328.949.104-.739.399-1.242.726-1.528-2.54-.289-5.211-1.27-5.211-5.654 0-1.249.446-2.27 1.177-3.07-.118-.29-.51-1.454.112-3.032 0 0 .96-.307 3.145 1.173A10.943 10.943 0 0 1 12 6.032a10.93 10.93 0 0 1 2.865.385c2.186-1.48 3.144-1.173 3.144-1.173.624 1.578.232 2.742.114 3.032.733.8 1.176 1.821 1.176 3.07 0 4.395-2.675 5.362-5.223 5.646.41.353.776 1.05.776 2.117 0 1.528-.014 2.76-.014 3.135 0 .309.207.668.79.555A11.503 11.503 0 0 0 23.5 12C23.5 5.649 18.351.5 12 .5Z"></path></svg>
                        </a>`
                      : ""
                  }
                </div>
              </div>
            `;
          })
          .join("");
      }
    </script>
  </body>
</html>
