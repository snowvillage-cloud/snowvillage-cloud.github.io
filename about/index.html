<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>運営について - Snowflake UG Japan</title>
    <link rel="stylesheet" href="../style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="header-container"></div>

    <main class="container" style="padding-top: 150px">
      <section>
        <h2 class="reveal">Current Organizers</h2>
        <h3>SnowVillage Mayors</h3>
        <p class="reveal" style="text-align: center; margin-bottom: 50px; color: var(--text-light)">コミュニティ全体の運営管理を行なっているメンバーです ※年次順＆アルファベット順</p>
        
        <div id="organizers-grid" class="grid"></div>
      </section>

      <section style="border-top: 1px solid #eee; padding-top: 80px">
        <h2 class="reveal">Sponsors</h2>
        <p class="reveal" style="text-align: center; margin-bottom: 50px; color: var(--text-light)">Japan Snowflake User Group の活動に協賛いただいている方々です。</p>

        <h3 class="reveal" style="text-align: center; color: #fbbf24; margin-bottom: 30px">Website Maintenance and Management</h3>
        
        <div id="sponsors-grid" class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr))"></div>
      </section>

      <div class="alumni-banner reveal">
        <h3>Mayors卒業生</h3>
        <p>過去にオーガナイザーとしてコミュニティの立ち上げや発展に貢献してくれたメンバー</p>
        <a href="alumni/" class="btn-alumni"> <span class="icon">🎓</span> <span class="text">卒業生一覧を見る</span> <span class="arrow">→</span> </a>
      </div>
    </main>

    <div id="footer-container"></div>

<script src="../script.js"></script>
    <script src="aboutData.js"></script>
    <script>
      renderHeader("..", "about");
      renderFooter();

      // 🌟 イベント待機を外し、直接実行します
      const orgGrid = document.getElementById('organizers-grid');
      if (orgGrid && typeof organizersData !== 'undefined') {
        orgGrid.innerHTML = organizersData.map((member, index) => `
          <div class="card reveal member-card" style="transition-delay: ${index * 0.1}s">
            <img src="${member.photo}" alt="${member.name}" class="member-photo" />
            <h3>${member.name}</h3>
            <p style="color: var(--primary); font-weight: 500">${member.role}</p>
            <p class="desc" style="font-size: 0.9rem; color: var(--text-light); margin-top: 10px">${member.desc}</p>
            <div class="member-sns">
              ${member.xUrl ? `
                <a href="${member.xUrl}" target="_blank" rel="noopener noreferrer" class="sns-link">
                  <svg viewBox="0 0 24 24" class="sns-icon"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                </a>` : ''}
              ${member.linkedInUrl ? `
                <a href="${member.linkedInUrl}" target="_blank" rel="noopener noreferrer" class="sns-link">
                  <svg viewBox="0 0 24 24" class="sns-icon"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"></path></svg>
                </a>` : ''}
            </div>
          </div>
        `).join('');
      } else {
        console.error("【エラー】organizersData が読み込めていないか、IDが間違っています");
      }

      const sponsorGrid = document.getElementById('sponsors-grid');
      if (sponsorGrid && typeof sponsorsData !== 'undefined') {
        sponsorGrid.innerHTML = sponsorsData.map((sponsor, index) => `
          <div class="card reveal sponsor-card" style="transition-delay: ${(index * 0.1) + 0.2}s; padding: 20px">
            <img src="${sponsor.logo}" alt="${sponsor.name}" class="sponsor-logo" style="max-height: 40px" />
            <p style="font-size: 0.8rem; font-weight: 600">${sponsor.desc}</p>
          </div>
        `).join('');
      }
    </script>
  </body>
</html>
