<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnowTris - Secret Page</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
      /* 隠しページ専用デザイン */
      .tetris-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 120px;
        padding-bottom: 50px;
        min-height: 100vh;
        background-color: var(--secondary);
        color: white;
      }
      .game-area {
        display: flex;
        gap: 30px;
        margin-top: 20px;
      }
      canvas {
        background-color: #000;
        border: 4px solid var(--primary);
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(41, 181, 232, 0.3);
      }
      .score-board {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .score-box {
        background: rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 8px;
        text-align: center;
        border: 1px solid var(--primary);
      }
      .score-value {
        font-size: 2rem;
        font-weight: 800;
        color: var(--primary);
        margin-top: 10px;
      }
      .controls-help {
        margin-top: 30px;
        color: var(--text-light);
        font-size: 0.9rem;
        text-align: center;
        line-height: 1.8;
      }
      kbd {
        background: #333;
        padding: 3px 8px;
        border-radius: 4px;
        border-bottom: 2px solid #111;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div id="header-container"></div>

    <main class="tetris-container">
      <h1 class="reveal" style="color: var(--primary); font-size: 3rem; letter-spacing: 2px;">❄️ SnowTris</h1>
      <p class="reveal">You found the secret page!</p>

      <div class="game-area reveal" style="transition-delay: 0.2s;">
        <canvas id="tetris" width="240" height="400"></canvas>
        
        <div class="score-board">
          <div class="score-box">
            <div>SCORE</div>
            <div id="score" class="score-value">0</div>
          </div>
          <button id="start-btn" class="btn" style="width: 100%;">START GAME</button>
        </div>
      </div>

      <div class="controls-help reveal" style="transition-delay: 0.4s;">
        <p><kbd>←</kbd> <kbd>→</kbd> : 移動</p>
        <p><kbd>↑</kbd> : 回転</p>
        <p><kbd>↓</kbd> : 高速落下</p>
      </div>
    </main>

    <script src="../script.js"></script>
    <script>
      // 共通ヘッダーの読み込み（メニューのハイライトは無し）
      renderHeader("..", "");

      // --- 🎮 テトリスのロジック ---
      const canvas = document.getElementById('tetris');
      const context = canvas.getContext('2d');
      context.scale(20, 20); // 1ブロックを20x20pxにスケール

      // SnowVillageカラーのブロック
      const colors = [
        null,
        '#29b5e8', // Snowflake Blue
        '#fbbf24', // Yellow
        '#f43f5e', // Rose
        '#10b981', // Emerald
        '#a855f7', // Purple
        '#f97316', // Orange
        '#6366f1', // Indigo
      ];

      function createMatrix(w, h) {
        const matrix = [];
        while (h--) { matrix.push(new Array(w).fill(0)); }
        return matrix;
      }

      function createPiece(type) {
        if (type === 'T') return [[0,0,0],[1,1,1],[0,1,0]];
        if (type === 'O') return [[2,2],[2,2]];
        if (type === 'L') return [[0,3,0],[0,3,0],[0,3,3]];
        if (type === 'J') return [[0,4,0],[0,4,0],[4,4,0]];
        if (type === 'I') return [[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
        if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
        if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
      }

      function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
          row.forEach((value, x) => {
            if (value !== 0) {
              context.fillStyle = colors[value];
              context.fillRect(x + offset.x, y + offset.y, 1, 1);
              // ブロックの枠線
              context.lineWidth = 0.05;
              context.strokeStyle = '#000';
              context.strokeRect(x + offset.x, y + offset.y, 1, 1);
            }
          });
        });
      }

      function draw() {
        context.fillStyle = '#0f172a'; // 背景色
        context.fillRect(0, 0, canvas.width, canvas.height);
        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
      }

      function merge(arena, player) {
        player.matrix.forEach((row, y) => {
          row.forEach((value, x) => {
            if (value !== 0) {
              arena[y + player.pos.y][x + player.pos.x] = value;
            }
          });
        });
      }

      function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
          for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
              return true;
            }
          }
        }
        return false;
      }

      function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
          player.pos.y--;
          merge(arena, player);
          playerReset();
          arenaSweep();
          updateScore();
        }
        dropCounter = 0;
      }

      function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) { player.pos.x -= dir; }
      }

      function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        // ゲームオーバー判定
        if (collide(arena, player)) {
          arena.forEach(row => row.fill(0));
          player.score = 0;
          updateScore();
          isPlaying = false;
          alert("Game Over! Your score: " + document.getElementById('score').innerText);
        }
      }

      function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
          player.pos.x += offset;
          offset = -(offset + (offset > 0 ? 1 : -1));
          if (offset > player.matrix[0].length) {
            rotate(player.matrix, -dir);
            player.pos.x = pos;
            return;
          }
        }
      }

      function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
          for (let x = 0; x < y; ++x) {
            [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
          }
        }
        if (dir > 0) { matrix.forEach(row => row.reverse()); } 
        else { matrix.reverse(); }
      }

      function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y > 0; --y) {
          for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) continue outer;
          }
          const row = arena.splice(y, 1)[0].fill(0);
          arena.unshift(row);
          ++y;
          player.score += rowCount * 100;
          rowCount *= 2;
        }
      }

      let dropCounter = 0;
      let dropInterval = 1000;
      let lastTime = 0;
      let isPlaying = false;

      function update(time = 0) {
        if (!isPlaying) return;
        const deltaTime = time - lastTime;
        lastTime = time;
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) { playerDrop(); }
        draw();
        requestAnimationFrame(update);
      }

      function updateScore() {
        document.getElementById('score').innerText = player.score;
      }

      const arena = createMatrix(12, 20);
      const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

      // キーボード操作（矢印キーで画面がスクロールするのを防ぐ）
      document.addEventListener('keydown', event => {
        if (!isPlaying) return;
        // 矢印キーの場合はデフォルトのスクロールを無効化
        if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(event.code)) {
            event.preventDefault();
        }
        if (event.keyCode === 37) { playerMove(-1); } // Left
        else if (event.keyCode === 39) { playerMove(1); } // Right
        else if (event.keyCode === 40) { playerDrop(); } // Down
        else if (event.keyCode === 38) { playerRotate(1); } // Up
      });

      document.getElementById('start-btn').addEventListener('click', () => {
        if (!isPlaying) {
          arena.forEach(row => row.fill(0));
          player.score = 0;
          updateScore();
          playerReset();
          isPlaying = true;
          update();
        }
      });

      // 初期描画
      draw();
    </script>
  </body>
</html>
